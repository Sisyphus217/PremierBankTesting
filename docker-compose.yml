services:
  db:
    image: postgres:17-alpine
    container_name: premier_bank_db
    environment:
      POSTGRES_DB: premier_bank
      POSTGRES_USER: premier
      POSTGRES_PASSWORD: premier123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U premier -d premier_bank"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: premier_bank_migrator
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=premier_bank;Username=premier;Password=premier123
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: premier_bank_api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=premier_bank;Username=premier;Password=premier123
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  postgres_data:
